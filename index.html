<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Universe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="sky"></canvas>

<!-- 🎵 MUSIC -->
<audio id="music" src="music.mp3" loop></audio>

<!-- 🌌 WELCOME -->
<div id="welcome">
  <div class="card">
    <h1>✨ Our Little Universe ✨</h1>
    <p>Hello Babyyy ❤️</p>
    <p>Every star holds a memory of us</p>
    <button id="startBtn">Begin Our Journey ❤️</button>
  </div>
</div>

<div class="moon"></div>

<div id="stars"></div>
<div id="counter"></div>
<div id="messageBox"></div>

<!-- 📸 FINAL -->
<div id="finalScreen">
  <div id="loader">0%</div>

  <div id="finalContent">
    <img src="photo.png" alt="us">
    <h2>Happy 19th Monthsary Babyyy ❤️</h2>

    <p class="scrollHint">✨ Scroll slowly… this is for you ❤️</p>
    <p id="typedText"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
